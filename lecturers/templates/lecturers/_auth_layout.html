{% extends 'lecturers/base.html' %}

{% block content %}
    <div class="lec-card">
        {% if messages %}
            <div class="alert-stack">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags|default:'info' }}">
                        <i class="fas fa-info-circle" aria-hidden="true"></i>
                        <div>{{ message }}</div>
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block auth_card %}{% endblock %}
    </div>
{% endblock %}
